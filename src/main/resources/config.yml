settings:
  # Folder for custom enchantment jars:
  # plugins/CustomEnchantments/enchantments/<enchantment-name>.jar
  load-external-jars: true
  enchantment-folder: enchantments
  book-title-format: "&dКнига чара: &f%display_name%"
  book-lore:
    - "&7Перетащи книгу на предмет,"
    - "&7чтобы наложить кастомный чар."
  messages:
    prefix: "&dCustomEnchantments &8» "
    no-permission: "&cУ тебя нет прав."
    player-only: "&cКоманда доступна только игроку."
    unknown-enchantment: "&cЧар &f%name% &cне найден."
    invalid-level: "&cУровень должен быть числом от 1 до %max_level%."
    hold-item: "&cВозьми предмет в руку."
    applied: "&aЧар &f%display_name% %level% &aналожен."
    book-given: "&aКнига чара &f%display_name% %level% &aвыдана."
    book-received: "&aТы получил книгу чара &f%display_name% %level%&a."
    cannot-apply: "&cЭтот чар нельзя наложить на этот предмет."

enchantments:
  magnetism:
    enabled: true
    display-name: "Магнетизм"
    max-level: 3
    # Drops from broken blocks go straight into the player's inventory.
    collect-block-drops: true
    # Items near the player are attracted on pickup attempts.
    pickup-radius-per-level: 2.5
  autosmelt:
    enabled: true
    display-name: "Автоплавка"
    max-level: 3
    # If fortune/silk/custom drill plugins changed drops first, the plugin uses final event drops.
    respect-silk-touch: true
